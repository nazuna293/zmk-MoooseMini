  - {type: held}
  - Ctl+Sft+TAB
  - Ctl+TAB
  - ENTER
  - DOWN
  - UP
  - SPACE
  - ''
  '6':
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
