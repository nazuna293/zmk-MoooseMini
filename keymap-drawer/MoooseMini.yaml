  - Gui+LEFT
  - Gui+UP
  - ENTER
  - Gui+DOWN
  - Gui+RIGHT
  - {type: held}
  - ''
  setting:
  - '&bootloader'
  - {t: BT, h: '1'}
  - '&sys_reset'
  - {t: BT, h: '4'}
  - {t: BT, h: '2'}
